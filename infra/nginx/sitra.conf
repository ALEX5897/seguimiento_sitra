# Configuración Nginx para Seguimiento SITRA
# Dominio: seguimientositra.quito-turismo.gob.ec
# Frontend: /opt/seguimiento_sitra/frontend/dist
# Backend: http://127.0.0.1:3001

server {
    listen 80;
    server_name seguimientositra.quito-turismo.gob.ec;

    root /opt/seguimiento_sitra/frontend/dist;
    index index.html;

    access_log /var/log/nginx/seguimiento_sitra.access.log;
    error_log  /var/log/nginx/seguimiento_sitra.error.log;

    # Mantenimiento
    if (-f /opt/seguimiento_sitra/.maintenance) {
        return 503;
    }

    error_page 503 @maintenance;

    location @maintenance {
        root /opt/seguimiento_sitra/infra/nginx;
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /maintenance.html {
        root /opt/seguimiento_sitra/infra/nginx;
        internal;
    }

    # Redirigir raíz
    location = / {
        return 302 /sitra/;
    }

    # Frontend
    location /sitra/ {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /sitra/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# HTTPS - Redirigir HTTP a HTTPS
server {
    listen 443 ssl;
    server_name seguimientositra.quito-turismo.gob.ec;

    ssl_certificate     /etc/nginx/ssl/quito-turismo.crt;
    ssl_certificate_key /etc/nginx/ssl/quito-turismo.key;

    root /opt/seguimiento_sitra/frontend/dist;
    index index.html;

    access_log /var/log/nginx/seguimiento_sitra_ssl.access.log;
    error_log  /var/log/nginx/seguimiento_sitra_ssl.error.log;

    # Frontend
    location /sitra/ {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /sitra/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# Redirigir HTTP a HTTPS
server {
    listen 80;
    server_name seguimientositra.quito-turismo.gob.ec;
    return 301 https://$host$request_uri;
}
